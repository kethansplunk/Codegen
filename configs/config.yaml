dataset:
  name: spider
  train_path: Data/Spider/train_spider.json
  dev_path: Data/Spider/dev.json
  db_path: Data/Spider/database/
  tables_path: Data/Spider/tables.json

fk_graph:
  cache_path: Data/fk_graphs/
  max_hops: 2
  fuzzy_threshold: 75
  top_k_seeds: 3

prompt_schema:
  sql_cache: Data/prompt_schema/sql/
  nosql_cache: Data/prompt_schema/nosql/
  top_k_values: 3

schema_linker:
  # "api"   → DeepSeek API (primary, no GPU needed, set DEEPSEEK_API_KEY)
  # "model" → trained local PEFT adapter (switch here once training is done)
  mode: api
  api_model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  max_retries: 3
  base_model: Qwen/Qwen3-8B        # used when mode=model
  sql_checkpoint: models/schema_linker_sql/
  nosql_checkpoint: models/schema_linker_nosql/
  self_consistency_k: 5            # k=5 for eval, k=1 for demo

sar:
  # "memory" → SARRetriever: re-encodes corpus at startup (~30 sec). No ChromaDB needed.
  # "chroma" → ChromaSARRetriever: instant startup using pre-built index (Phase 13).
  backend: chroma
  encoder_model: BAAI/bge-large-en-v1.5
  sql_checkpoint: models/sar_sql/sar_model.pt
  nosql_checkpoint: models/sar_nosql/sar_model.pt
  sql_corpus: Data/rag_corpus/spider_sql_rag.json
  nosql_corpus: Data/rag_corpus/spider_nosql_rag.json
  sql_chroma_dir: indexes/chroma_sql
  nosql_chroma_dir: indexes/chroma_nosql
  sql_collection: sar_sql
  nosql_collection: sar_nosql
  top_k: 3
  # SchemaAwareModel has exactly 2 fixed stages (table_column + question_table attention).
  # num_heads is the only architectural param; SQL uses 8, NoSQL uses 2 (smaller dataset).
  num_heads_sql: 8
  num_heads_nosql: 2
  embed_dim: 1024
  dropout: 0.1
  lr: 1.0e-4
  triplet_margin: 0.3          # triplet loss margin used in src/sar/train.py

generator:
  base_model: Qwen/Qwen2.5-Coder-7B-Instruct
  sql_checkpoint: models/generator_sql/
  nosql_checkpoint: models/generator_nosql/
  n_candidates: 5
  temperature: 0.8
  top_p: 0.95
  max_new_tokens: 2048

indexes:
  sql_chroma: indexes/chroma_sql/
  nosql_chroma: indexes/chroma_nosql/

mongodb:
  host: localhost
  port: 27017
  schema_cache: Data/mongodb/

evaluation:
  results_dir: evaluation/results/